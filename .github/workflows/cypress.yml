# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/cypress.yml
# CI Pipeline — Cypress Hybrid E2E Framework · Conduit Blog App
# Repo: https://github.com/Sravani676/Cypress-Bondar-Academy-Hybrid-Test-Framework
# ─────────────────────────────────────────────────────────────────────────────
#
# Triggers:
#   • push           → main, develop
#   • pull_request   → main, develop
#   • schedule       → daily at 06:00 UTC (smoke only)
#   • workflow_dispatch → manual run with suite + browser selectors
#
# Jobs:
#   ┌─ lint        ── ESLint check (fast gate, no browser needed)
#   ├─ smoke       ── login smoke tags on Chrome (~2 min)
#   ├─ regression  ── ui + api suites in a browser matrix
#   └─ report      ── merge JSON → single HTML, post run summary
# ─────────────────────────────────────────────────────────────────────────────

name: Cypress E2E — Hybrid Framework

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  # Nightly smoke run at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger — choose suite and browser
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - ui
          - api
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - electron

# Cancel any in-progress run for the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 · LINT — fast ESLint gate before anything runs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 · SMOKE — critical path gate on Chrome before full matrix
  # ─────────────────────────────────────────────────────────────────────────
  smoke:
    name: 🚀 Smoke — Chrome
    runs-on: ubuntu-latest
    needs: lint
    # Skip when manually dispatching api-only or non-smoke suites
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'all'      ||
      inputs.suite == 'smoke'    ||
      inputs.suite == 'ui'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ${{ env.CYPRESS_CACHE_FOLDER }}
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: 🚀 Run smoke suite (tagged tests)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
          wait-on: 'https://conduit.bondaracademy.com'
          wait-on-timeout: 60
          env: 'grepTags=smoke'
        env:
          CYPRESS_BASE_URL: https://conduit.bondaracademy.com

      - name: 📸 Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: 🎬 Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-videos
          path: cypress/videos/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 · REGRESSION — UI + API in a browser matrix
  # ─────────────────────────────────────────────────────────────────────────
  regression:
    name: 🧪 ${{ matrix.suite.name }} · ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: smoke

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
        suite:
          - name: ui
            spec: 'cypress/e2e/ui/**/*.cy.js'
            tag: regression
          - name: api
            spec: 'cypress/e2e/api/**/*.cy.js'
            tag: regression

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ${{ env.CYPRESS_CACHE_FOLDER }}
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: 🧪 Run ${{ matrix.suite.name }} suite on ${{ matrix.browser }}
        uses: cypress-io/github-action@v6
        with:
          spec: ${{ matrix.suite.spec }}
          browser: ${{ matrix.browser }}
          headed: false
          wait-on: 'https://conduit.bondaracademy.com'
          wait-on-timeout: 60
          reporter: mochawesome
          reporter-options: >
            reportDir=cypress/reports/mochawesome/${{ matrix.suite.name }}-${{ matrix.browser }},
            overwrite=false,
            html=false,
            json=true,
            embeddedScreenshots=true,
            inlineAssets=true
          env: 'grepTags=${{ matrix.suite.tag }}'
        env:
          CYPRESS_BASE_URL: https://conduit.bondaracademy.com

      - name: 📸 Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.suite.name }}-${{ matrix.browser }}
          path: cypress/screenshots/
          retention-days: 14

      - name: 🎬 Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ matrix.suite.name }}-${{ matrix.browser }}
          path: cypress/videos/
          retention-days: 7

      - name: 📊 Upload Mochawesome JSON fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-json-${{ matrix.suite.name }}-${{ matrix.browser }}
          path: cypress/reports/mochawesome/${{ matrix.suite.name }}-${{ matrix.browser }}/*.json
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 · REPORT — merge all JSON fragments → one HTML report
  # ─────────────────────────────────────────────────────────────────────────
  report:
    name: 📋 Merge & Publish Report
    runs-on: ubuntu-latest
    needs: regression
    if: always()

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Download all JSON report fragments
        uses: actions/download-artifact@v4
        with:
          pattern: report-json-*
          path: cypress/reports/raw/
          merge-multiple: true

      - name: 🔀 Merge JSON fragments
        run: |
          npx mochawesome-merge "cypress/reports/raw/**/*.json" \
            --output cypress/reports/mochawesome.json

      - name: 🌐 Generate HTML report
        run: |
          npx marge cypress/reports/mochawesome.json \
            -f report \
            -o cypress/reports \
            --inline \
            --charts \
            --reportTitle "Conduit Hybrid E2E · ${{ github.ref_name }} @ $(echo ${{ github.sha }} | cut -c1-7)"

      - name: 📤 Upload final HTML report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-html-report
          path: cypress/reports/report.html
          retention-days: 30

      - name: 💬 Write job summary
        if: always()
        run: |
          echo "## 🧪 Cypress Hybrid E2E — Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | \`${{ github.repository }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cypress** | \`15.12.0\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AUT** | https://conduit.bondaracademy.com |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the **cypress-html-report** artifact above to view the full inline HTML report." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Matrix Runs" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Chrome | Firefox |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| UI (regression) | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| API (regression) | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY